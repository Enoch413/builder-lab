<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREP MASTER BUILDER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Lexend:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="./firebase-config.js"></script>
<script src="./embedded_host_bridge.js"></script>
<style>
:root{
  --pl-ink:#163f42;
  --pl-ink-soft:#5a4a3a;
  --pl-muted:#8a7a6a;
  --pl-surface:#f7f4ee;
  --pl-surface-strong:rgba(255,255,255,.92);
  --pl-line:rgba(24,71,72,.08);
  --pl-accent:#163f42;
  --pl-accent-soft:#efe7d8;
  --pl-blue:#1a5fc8;
  --pl-blue-deep:#174fa7;
  --pl-success:#1f6c54;
  --pl-success-soft:rgba(31,108,84,.1);
  --pl-danger:#b55033;
  --pl-danger-soft:rgba(181,80,51,.08);
  --pl-shadow:0 18px 34px rgba(30,42,39,.06);
  --pl-shadow-soft:0 10px 24px rgba(30,42,39,.05);
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Plus Jakarta Sans","Noto Sans KR","Segoe UI",sans-serif;
  background:
    radial-gradient(circle at top left, rgba(46,123,105,.14), transparent 32%),
    radial-gradient(circle at top right, rgba(217,187,139,.22), transparent 28%),
    linear-gradient(180deg,#f7f2ea 0%,#f0e8dc 52%,#ece4d7 100%);
  color:var(--pl-ink);
  min-height:100vh;
  position:relative;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.16'/%3E%3C/svg%3E");
  opacity:.28;
  pointer-events:none;
  z-index:-2;
}
button,input{font:inherit}
#header{
  width:min(560px, calc(100% - 36px));
  margin:8px auto 18px;
  padding:14px 18px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:14px;
  background:rgba(246,242,234,.88);
  border:1px solid var(--pl-line);
  border-radius:0 0 18px 18px;
  box-shadow:0 10px 24px rgba(30,42,39,.07);
  backdrop-filter:blur(12px);
}
.header-copy{display:flex;flex-direction:column;gap:2px;min-width:0}
#header h1{
  margin:0;
  font-family:"Lexend","Plus Jakarta Sans",sans-serif;
  font-size:2rem;
  font-weight:700;
  letter-spacing:-.03em;
  color:var(--pl-ink);
}
.badge{
  order:-1;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:48px;
  height:42px;
  padding:0 14px;
  border-radius:14px;
  border:1px solid var(--pl-line);
  background:#fff;
  box-shadow:0 8px 18px rgba(30,42,39,.06);
  color:var(--pl-accent);
  font-family:"Lexend","Plus Jakarta Sans",sans-serif;
  font-size:10px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  white-space:nowrap;
}
#layout{
  width:min(1520px, calc(100% - 40px));
  margin:0 auto 28px;
  display:grid;
  grid-template-columns:minmax(360px, 430px) minmax(0, 1fr);
  gap:22px;
  align-items:start;
}
#left{
  padding:16px;
  border-radius:28px;
  background:rgba(247,244,238,.9);
  border:1px solid var(--pl-line);
  box-shadow:var(--pl-shadow);
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  gap:14px;
}
#right{
  min-height:360px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.step,
.workspace-stage,
.summary-card,
.file-zone,
.target-chip,
.target-empty,
.editor-card,
.empty-box,
.result{
  background:var(--pl-surface-strong);
  border:1px solid var(--pl-line);
  border-radius:22px;
  box-shadow:var(--pl-shadow-soft);
}
.field-label,
.step-num,
.summary-label,
.section-title,
.summary-kicker{
  font-family:"Lexend","Plus Jakarta Sans",sans-serif;
  font-size:11px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--pl-accent);
}
.section-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;
  margin-bottom:14px;
}
.section-name{
  margin-top:6px;
  font-size:1rem;
  font-weight:800;
  color:var(--pl-ink);
}
.workspace-stage{
  min-height:260px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:36px 24px;
  text-align:center;
  background:transparent;
  border:none;
  box-shadow:none;
}
.workspace-kicker{
  font-family:"Lexend","Plus Jakarta Sans",sans-serif;
  font-size:28px;
  font-weight:700;
  letter-spacing:-.03em;
  text-transform:uppercase;
  color:var(--pl-ink-soft);
}
.workspace-copy{
  margin-top:10px;
  max-width:420px;
  font-size:12px;
  line-height:1.75;
  color:var(--pl-muted);
}
.step{padding:18px}
.step-num{
  display:inline-flex;
  align-items:center;
  margin-bottom:8px;
}
.step-title{
  font-size:1rem;
  font-weight:800;
  color:var(--pl-ink);
}
.step-desc{
  margin-top:8px;
  margin-bottom:12px;
  font-size:12px;
  line-height:1.75;
  color:var(--pl-muted);
}
.class-field-stack{
  display:flex;
  flex-direction:column;
  gap:16px;
  margin-top:16px;
}
.set-field-stack{
  display:grid;
  gap:14px;
}
.set-date-grid{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:12px;
}
.set-note{
  font-size:12px;
  line-height:1.75;
  color:var(--pl-muted);
}
.step-head{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  margin-bottom:12px;
}
.step-head .step-title{
  margin:0;
}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.setup-actions{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  width:100%;
  margin-top:14px;
}
.setup-actions .btn{width:100%}
.summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.summary-card{padding:16px}
.summary-label,
.summary-kicker{white-space:nowrap}
.summary-value{
  margin-top:8px;
  font-family:"Lexend","Plus Jakarta Sans",sans-serif;
  font-size:1.2rem;
  font-weight:700;
  color:var(--pl-ink);
}
.file-zone{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:150px;
  padding:24px 16px;
  border-style:dashed;
  text-align:center;
  cursor:pointer;
  background:var(--pl-surface);
}
.file-zone:hover{border-color:rgba(24,71,72,.18)}
.file-zone.loaded{
  border-color:rgba(31,108,84,.25);
  background:rgba(31,108,84,.06);
}
.file-zone.status-box{cursor:default}
.file-zone.status-box:hover{border-color:var(--pl-line)}
.fz-title{font-size:.95rem;font-weight:800}
.fz-sub{margin-top:6px;font-size:12px;color:var(--pl-muted);line-height:1.7}
.target-toolbar,
.target-grid,
.toolbar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.toolbar{
  flex-direction:column;
  align-items:stretch;
  gap:10px;
  margin:14px 0;
}
.toolbar .btn{width:100%}
.target-grid{margin-bottom:14px}
.target-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:999px;
  background:var(--pl-surface);
  font-size:12px;
  font-weight:700;
  color:var(--pl-ink-soft);
}
.target-chip input{margin:0}
.target-empty{
  padding:12px 14px;
  border-style:dashed;
  background:var(--pl-surface);
  font-size:12px;
  color:var(--pl-muted);
}
input[type=text],input[type=date]{
  width:100%;
  padding:12px 14px;
  border:1.5px solid rgba(23,79,89,.14);
  border-radius:18px;
  background:rgba(255,255,255,.96);
  color:var(--pl-ink);
  outline:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
}
input[type=text]:focus,input[type=date]:focus{
  border-color:rgba(26,95,200,.35);
  box-shadow:0 0 0 4px rgba(26,95,200,.08);
}
.mono-input{font-family:"JetBrains Mono",monospace !important;letter-spacing:2px;text-align:center}
.field-label{margin-bottom:8px}
.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:42px;
  padding:10px 16px;
  border:1px solid transparent;
  border-radius:16px;
  cursor:pointer;
  font-weight:800;
  transition:transform .14s ease, box-shadow .14s ease, background .14s ease, border-color .14s ease;
}
.btn:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-red{
  background:var(--pl-accent);
  color:#fff;
  box-shadow:0 12px 26px rgba(22,63,66,.18);
}
.btn-blue{
  background:var(--pl-accent);
  color:#fff;
  box-shadow:0 12px 26px rgba(22,63,66,.18);
}
.btn-ghost{
  background:var(--pl-accent-soft);
  color:var(--pl-ink);
  border-color:rgba(24,71,72,.08);
}
.btn-light{
  background:var(--pl-accent-soft);
  color:var(--pl-ink);
  border-color:rgba(24,71,72,.08);
}
.btn-danger{
  background:var(--pl-danger-soft);
  color:var(--pl-danger);
  border-color:rgba(181,80,51,.18);
}
.btn-sm{min-height:36px;padding:7px 12px;font-size:.76rem}
.field{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.field label{
  font-family:"Lexend","Plus Jakarta Sans",sans-serif;
  font-size:11px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--pl-accent);
}
.hint{
  font-size:12px;
  line-height:1.75;
  color:var(--pl-muted);
}
.class-list{display:flex;flex-direction:column;gap:12px}
.class-row{
  display:grid;
  grid-template-columns:.8fr 1fr auto;
  gap:10px;
  align-items:end;
}
.editor-list{display:grid;gap:14px}
.editor-card{
  padding:14px;
  background:linear-gradient(180deg, rgba(247,244,238,.82), rgba(255,255,255,.96));
}
.editor-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  flex-wrap:wrap;
  margin-bottom:12px;
}
.editor-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.editor-index{
  font-family:"Lexend","Plus Jakarta Sans",sans-serif;
  font-size:13px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--pl-blue);
}
.editor-meta,.assign-meta,.passage-preview{
  margin-top:4px;
  font-size:12px;
  line-height:1.7;
  color:var(--pl-muted);
}
.class-checks{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}
.class-check{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border-radius:999px;
  background:var(--pl-surface);
  font-size:12px;
  font-weight:700;
  color:var(--pl-ink-soft);
  white-space:nowrap;
}
.class-check input{
  margin:0;
  width:14px;
  height:14px;
  flex:0 0 auto;
  accent-color:#1a5fc8;
}
.set-assignment-meta{
  margin-top:4px;
  font-size:12px;
  line-height:1.7;
  color:var(--pl-muted);
}
.empty-box{
  padding:18px;
  text-align:center;
  color:var(--pl-muted);
  font-size:12px;
  line-height:1.8;
  border-style:dashed;
  background:var(--pl-surface);
}
@media (max-width:980px){
  #header,#layout{width:min(100%, calc(100% - 24px))}
  #layout{grid-template-columns:1fr;gap:18px}
  #left{padding:14px}
  #right{min-height:auto}
}
@media (max-width:820px){
  .summary-grid,.row-2,.set-date-grid,.class-row{grid-template-columns:1fr}
  .step-head{align-items:stretch;flex-direction:column}
}
@media (max-width:640px){
  #header{
    padding:12px 14px;
    border-radius:0 0 16px 16px;
    gap:12px;
  }
  #header h1{font-size:1.45rem}
  .badge{
    min-width:42px;
    height:38px;
    padding:0 12px;
    border-radius:12px;
    font-size:9px;
  }
}
</style>
</head>
<body>
<div id="header">
  <div class="header-copy">
    <h1>PREP MASTER BUILDER</h1>
  </div>
  <div class="badge">WORKSPACE</div>
</div>

<div id="layout">
  <aside id="left">
    <section class="step">
      <div class="section-head">
        <div>
          <div class="section-title">Setup</div>
          <div class="section-name">JSON 불러오기</div>
        </div>
      </div>
      <div class="setup-actions">
        <button class="btn btn-ghost" id="load-master-btn" type="button">master session 불러오기</button>
        <button class="btn btn-blue" id="add-rotation-btn" type="button">ROTATION 세션 추가</button>
        <button class="btn btn-red" id="generate-btn" type="button" disabled>master session.json 다운로드</button>
      </div>
      <input type="file" id="master-input" accept=".json,application/json" hidden>
      <input type="file" id="rotation-input" accept=".json,application/json" hidden>
    </section>

    <section class="step">
      <div class="section-head">
        <div>
          <div class="section-title">Summary</div>
          <div class="section-name">현재 운영 현황</div>
        </div>
      </div>
      <div class="summary-grid" id="summary-grid"></div>
    </section>

    <section class="step">
      <div class="section-head">
        <div>
          <div class="section-title">Classes</div>
          <div class="section-name">반 설정</div>
        </div>
        <button class="btn btn-light" type="button" id="add-class-btn">반 추가</button>
      </div>
      <div class="class-list" id="class-editor"></div>
    </section>
  </aside>

  <main id="right">
    <div class="workspace-stage" id="set-empty">
      <div class="workspace-kicker">READY TO BUILD</div>
    </div>
    <div id="set-workspace" style="display:none">
      <section class="step">
        <div class="step-num">Step 03</div>
        <div class="step-title">학습 세트 설정</div>
        <div class="step-desc">학습 세트마다 제목과 기간을 정하고, 공개할 반만 체크합니다. 기간이 지나면 학생 화면에서는 종료 상태로 보입니다.</div>
        <div class="editor-list" id="set-editor"></div>
      </section>
    </div>
  </main>
</div>

<script src="./prep_builder_app.js"></script>
</body>
</html>
